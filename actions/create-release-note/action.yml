name: rellog create release note
description: Create a GitHub Release using a rellog-generated release note as the body.

inputs:
  release-id:
    required: true
    description: Release id to publish. Used as the release tag and to locate .rellog/release-notes/<release-id>.md. (i.e. v1.0.0)
  working-directory:
    required: false
    default: "."
    description: Directory, relative to github.workspace, containing the .rellog directory.

runs:
  using: composite
  steps:
    - name: Validate working directory
      id: workdir
      shell: bash
      env:
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        if [[ "${INPUT_WORKING_DIRECTORY}" = /* || "${INPUT_WORKING_DIRECTORY}" =~ ^[A-Za-z]:[\\/] ]]; then
          echo "working-directory must be relative to github.workspace." >&2
          exit 1
        fi

        workspace="$(cd "${GITHUB_WORKSPACE}" && pwd -P)"
        if ! resolved="$(cd "${workspace}/${INPUT_WORKING_DIRECTORY}" 2>/dev/null && pwd -P)"; then
          echo "working-directory does not exist or is not a directory: ${INPUT_WORKING_DIRECTORY}" >&2
          exit 1
        fi

        case "${resolved}" in
          "${workspace}" | "${workspace}"/*) ;;
          *)
            echo "working-directory must resolve inside github.workspace: ${INPUT_WORKING_DIRECTORY}" >&2
            exit 1
            ;;
        esac

        echo "path=${resolved}" >> "${GITHUB_OUTPUT}"

    # remove the version header, because action-gh-release will add it automatically as the release title.
    - name: Strip version header from release note
      id: note
      shell: bash
      env:
        RELEASE_ID: ${{ inputs.release-id }}
        WORKING_DIRECTORY: ${{ steps.workdir.outputs.path }}
      run: |
        set -euo pipefail

        source_file="${WORKING_DIRECTORY}/.rellog/release-notes/${RELEASE_ID}.md"
        if [[ ! -f "${source_file}" ]]; then
          echo "Release note file not found: ${source_file}" >&2
          exit 1
        fi

        out_dir="${RUNNER_TEMP}/create-release-note-action"
        mkdir -p "${out_dir}"
        out_file="${out_dir}/release-notes.md"

        sed '/^## /d' "${source_file}" > "${out_file}"

        echo "path=${out_file}" >> "${GITHUB_OUTPUT}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
      with:
        tag_name: ${{ inputs.release-id }}
        body_path: ${{ steps.note.outputs.path }}
