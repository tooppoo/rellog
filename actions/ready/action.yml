name: rellog ready
description: Install rellog from this action repository and run rellog ready for a release id.

inputs:
  release-id:
    required: true
    description: Release id to check. (i.e. v1.0.0)
  version:
    required: false
    description: rellog CLI version to install from GitHub Releases.
  working-directory:
    required: false
    default: "."
    description: Directory, relative to github.workspace, where rellog ready runs.

runs:
  using: composite
  steps:
    - name: Resolve rellog version
      id: version
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        ACTION_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail

        version="${INPUT_VERSION}"
        if [[ -z "${version}" ]]; then
          if [[ "${ACTION_REF}" == "latest" ]]; then
            # let the installer resolve the latest rellog CLI release
            echo "release_tag=" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          # use rellog CLI version correspoinding to the action version tag,
          # if the action is being run from a version tag
          if [[ "${ACTION_REF}" =~ ^v[0-9]+(\.[0-9]+){2}([-+][0-9A-Za-z.-]+)?$ ]]; then
            version="${ACTION_REF}"
          else
            {
              echo "Unable to resolve the rellog CLI version from the action ref '${ACTION_REF}'."
              echo "Use this action by a version tag such as v0.1.0 or latest, or set the 'version' input explicitly."
            } >&2
            exit 1
          fi
        fi

        release_tag="${version#refs/tags/}"
        if [[ ! "${release_tag}" =~ ^v[0-9]+(\.[0-9]+){2}([-+][0-9A-Za-z.-]+)?$ || "${release_tag}" == "latest" ]]; then
          echo "Invalid rellog CLI version '${version}'. Set 'version' to a concrete GitHub Release tag such as v0.1.0." >&2
          exit 1
        fi

        echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

    - name: Install rellog
      id: install
      shell: bash
      env:
        RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
      run: |
        set -euo pipefail

        bin_dir="${RUNNER_TEMP}/rellog-ready-action/bin"
        rm -rf "${bin_dir}"
        mkdir -p "${bin_dir}"

        installer_args=(--install-dir "${bin_dir}")
        if [[ -n "${RELEASE_TAG}" ]]; then
          installer_args=(--version "${RELEASE_TAG}" "${installer_args[@]}")
        fi

        curl -fsSL https://raw.githubusercontent.com/tooppoo/rellog/refs/heads/main/install.sh \
          | sh -s -- "${installer_args[@]}"

        echo "${bin_dir}" >> "${GITHUB_PATH}"

    - name: Validate working directory
      id: workdir
      shell: bash
      env:
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail

        if [[ "${INPUT_WORKING_DIRECTORY}" = /* || "${INPUT_WORKING_DIRECTORY}" =~ ^[A-Za-z]:[\\/] ]]; then
          echo "working-directory must be relative to github.workspace." >&2
          exit 1
        fi

        workspace="$(cd "${GITHUB_WORKSPACE}" && pwd -P)"
        if ! resolved="$(cd "${workspace}/${INPUT_WORKING_DIRECTORY}" 2>/dev/null && pwd -P)"; then
          echo "working-directory does not exist or is not a directory: ${INPUT_WORKING_DIRECTORY}" >&2
          exit 1
        fi

        case "${resolved}" in
          "${workspace}" | "${workspace}"/*) ;;
          *)
            echo "working-directory must resolve inside github.workspace: ${INPUT_WORKING_DIRECTORY}" >&2
            exit 1
            ;;
        esac

        echo "path=${resolved}" >> "${GITHUB_OUTPUT}"

    - name: Run rellog ready
      shell: bash
      env:
        RELEASE_ID: ${{ inputs.release-id }}
        WORKING_DIRECTORY: ${{ steps.workdir.outputs.path }}
      run: |
        set -euo pipefail

        cd "${WORKING_DIRECTORY}"
        rellog ready "${RELEASE_ID}"
